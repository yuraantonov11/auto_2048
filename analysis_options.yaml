# Configures the Dart analyzer for the auto_2048 bot.
#
# Inherits the recommended Flutter lint set, then tightens it with a
# handful of rules that the bot benefits from:
#
#   * prefer_const_constructors / prefer_final_locals — make heap
#     allocations and field rebinds explicit so the solver's hot path
#     stays obvious when reading heuristics.dart.
#   * unawaited_futures — force every async call site to either await
#     the future or wrap it in `unawaited(...)`. The controller loop
#     used to silently drop errors from probeScreen() and swipe().
#   * avoid_dynamic_calls — keep the bridge layer honest about typed
#     payloads.
#   * prefer_single_quotes / require_trailing_commas — stylistic.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - build/**
    - .dart_tool/**
    - android/**
    - ios/**
    - web/**
    - windows/**
    - macos/**
    - linux/**

linter:
  rules:
    # ── Correctness ────────────────────────────────────────────────────
    unawaited_futures: true
    avoid_dynamic_calls: true
    cancel_subscriptions: true
    close_sinks: true
    # ── Style ──────────────────────────────────────────────────────────
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_locals: true
    prefer_final_in_for_each: true
    prefer_single_quotes: true
    require_trailing_commas: true
    sort_child_properties_last: true
    unnecessary_lambdas: true
    use_super_parameters: true
